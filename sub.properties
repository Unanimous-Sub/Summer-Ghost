# Thông tin chung
group=UNNM
group_full=Unanimous
show=Summer Ghost
short=Summer Ghost

# Thông tin codec
format=BDRip 1080p
vcodec=AVC
acodec=FLAC
codec_info=${format} ${vcodec} ${acodec}

vtrack=AVC @ Vanilla
atrack=FLAC 2.0 @ 3069 kb/s

# Thông tin file output
title=[${group}] ${show} - (${codec_info})
muxdir=[${group}] ${show} (${codec_info})
muxout=muxdir/${title} [${mux.crc}].mkv
ncmuxout=${muxdir}/Creditless/${muxout}

# Raws và Font
raw=raws/${short}*.mkv
fonts=fonts

# Thông tin về file sub
dialogue=${short} - Dialogue.ass
extra=${short} - Extra.ass
TS=${short} - TS*.ass
INS=${short} - INS*.ass

# Số tập
episodes={01..24}

# Thông tin về OP và ED
{01..12}.OP_name=NCOP1
{13..24}.OP_name=NCOP2
{01..12}.ED_name=NCED1
{13..23}.ED_name=NCED2

OP=${OP_name}/${short}_${OP_name}.ass
ED=${ED_name}/${short}_${ED_name}.ass

# Creditless
ncs=NCOP{1..2}|NCED{1..2}
ncsubs=${short}_${episode}.ass
ncraw=raws/${short} - ${episode}*.mkv